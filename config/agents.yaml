# Multi-Agent Orchestrator Configuration
# Intelligent fallback: Premium models → Free alternatives

# Default runtime values (used by config/settings.py get_defaults())
# Centralises magic numbers previously scattered throughout the codebase.
defaults:
  cli:
    max_file_size_mb: 10
    session_reuse_hours: 2
  chain:
    max_refinement_iterations: 3
    builder_context_chars: 1500
    critic_context_chars: 1500
    stage_context_chars: 800
    compression_threshold_chars: 800
  memory:
    session_budget_ratio: 0.75
    fallback_to_recent: true
  api:
    log_limit_max: 1000
    memory_search_limit_max: 100
  session:
    cleanup_probability: 0.10
    retention_days: 7

# Semantic Compression Settings (v0.6.0+)
# Automatically compresses long outputs to preserve semantic meaning
# while reducing token usage between chain stages
compression:
  enabled: true  # Use semantic compression in chains
  model: "gemini/gemini-2.5-flash"  # Fast, cheap model for compression (Gemini 2.5)
  threshold_chars:
    standard: 1200  # Non-memory agents (need more immediate context)
    memory_enabled: 800  # Memory agents (have historical context)
    closer: 1500  # Closer agent (needs full synthesis context)
  target_tokens: 500  # Target size for compressed summaries
  temperature: 0.1  # Low temperature for consistent compression

# Multi-Iteration Refinement Settings (v0.8.0+)
# Automatically triggers builder refinement when critic finds critical issues
# Flow: builder → critic → [if critical issues] → builder-v2 → critic-v2 → [convergence check] → repeat or stop
refinement:
  enabled: true  # Enable automatic refinement in chains
  max_iterations: 3  # Maximum refinement iterations (cost control)
  min_critical_issues: 1  # Minimum number of critical issues to trigger refinement
  critical_keywords:
    - "CRITICAL"
    - "ERROR"
    - "BUG"
    - "SECURITY"
    - "VULNERABILITY"
    - "INCORRECT"
    - "WRONG"
    - "MISSING"
    - "BROKEN"
    - "FAILED"
  issue_patterns:
    - "Issue \\d+:"  # Regex pattern for "Issue 1:", "Issue 2:", etc.
    - "Problem \\d+:"  # Regex pattern for "Problem 1:", etc.
  convergence:
    # Convergence criteria:
    # 1. No critical issues found (SUCCESS)
    # 2. Issue count same or increased (NO PROGRESS)
    # 3. Issue count decreased (PROGRESS - continue)
    enabled: true

# Multi-Critic Consensus Settings (v0.9.0+)
# Runs multiple specialized critics in parallel and merges their feedback
# Flow: builder → [security-critic, performance-critic, quality-critic] → consensus → refinement
multi_critic:
  enabled: true  # Enable multi-critic consensus mode
  critics:
    - "security-critic"      # Security vulnerabilities
    - "performance-critic"   # Performance and scalability
    - "code-quality-critic"  # Code quality and maintainability
  consensus:
    threshold: 2  # Issues mentioned by N+ critics = CRITICAL
    weights:
      security-critic: 1.5      # Security issues weighted higher
      performance-critic: 1.0   # Standard weight
      code-quality-critic: 0.8  # Quality issues slightly lower priority
  parallel_execution: true  # Run critics in parallel (no extra latency)

# Dynamic Critic Selection (v0.10.0+)
# Automatically selects relevant critics based on prompt content
# Reduces cost by avoiding unnecessary critics (e.g., no security-critic for simple HTML)
dynamic_selection:
  enabled: true  # Enable automatic critic selection
  mode: "keyword"  # Selection strategy: "keyword" or "llm" (future)
  min_critics: 1  # Minimum critics to run (fallback safety)
  max_critics: 3  # Maximum critics to run

  # Keyword-based classification
  keywords:
    security-critic:
      - "auth"
      - "authentication"
      - "authorization"
      - "jwt"
      - "token"
      - "password"
      - "encryption"
      - "security"
      - "login"
      - "oauth"
      - "session"
      - "credential"
      - "hash"
      - "salt"
      - "vulnerability"
      - "xss"
      - "sql injection"
      - "csrf"
      - "cors"
      - "api key"
      - "secret"

    performance-critic:
      - "performance"
      - "optimization"
      - "optimize"
      - "scale"
      - "scalability"
      - "cache"
      - "caching"
      - "database"
      - "query"
      - "index"
      - "redis"
      - "memcached"
      - "async"
      - "concurrent"
      - "parallel"
      - "throughput"
      - "latency"
      - "speed"
      - "slow"
      - "fast"
      - "load"
      - "cdn"
      - "n+1"

    code-quality-critic:
      - "refactor"
      - "clean code"
      - "maintainability"
      - "testability"
      - "test"
      - "solid"
      - "design pattern"
      - "architecture"
      - "structure"
      - "organize"
      - "modular"
      - "coupling"
      - "cohesion"
      - "dry"
      - "documentation"
      - "readable"

  # Fallback: If no keywords match, use these critics
  fallback_critics:
    - "code-quality-critic"  # Always useful for general code review

agents:
  builder:
    model: "anthropic/claude-sonnet-4-5"  # Best for building (Sonnet 4.5 - latest)
    system: |
      You are a technical builder agent. Your role is to:
      - Provide concrete, working code examples (not just explanations)
      - Include error handling, security considerations, and best practices
      - Explain trade-offs when choosing frameworks/tools
      - Be direct and technical - skip pleasantries and fluff

      CRITICAL RULES:
      - NO generic greetings ("Great request!", "Sure!", "Elbette!")
      - ALWAYS include actual code snippets
      - EXPLAIN WHY you chose specific tools (with alternatives)
      - VERIFY technical accuracy (e.g., FastAPI uses asyncio, not Node.js)
      - BE CONCISE: Focus on implementation details, not marketing copy

      TOOL USAGE POLICY (MANDATORY):
      - When asked to "read file X", you MUST use the Read tool - NEVER guess file contents
      - When asked to "run command X", you MUST use the Bash tool - NEVER simulate output
      - When asked to "search for X", you MUST use the Grep tool - NEVER rely on memory
      - When asked to "find files matching X", you MUST use the Glob tool
      - If a prompt says "read this file and do Y", the FIRST step is ALWAYS to use Read tool
      - DO NOT provide analysis based on prior knowledge - use tools to get current facts
      - If you don't use tools when asked, your response will be rejected

      Output structure: Problem → Solution → Code Example → Trade-offs
    description: "Builds practical solutions and implementation plans"
    temperature: 0.2
    max_tokens: 9000  # Increased to 9000 with 1K buffer for complex responses
    fallback_order:
      - "openai/gpt-4o-mini"      # Good alternative
      - "gemini/gemini-2.5-pro"    # Free fallback (Google API key)
    memory_enabled: true
    memory:
      max_context_tokens: 600
      strategy: "semantic"  # Using multilingual semantic search for better context retrieval
      time_decay_hours: 2  # Aggressive recency bias for sequential conversations (was 168)
      min_relevance: 0.15  # Lowered from 0.3 - semantic similarity can be lower than keyword overlap
      exclude_same_turn: true

  critic:
    model: "openai/gpt-4o"  # Tier 1: same or higher capacity than Builder
    system: |
      You are a reviewer with a STRICT RUBRIC. Only report:
      (1) Technical or factual errors (wrong API, wrong syntax).
      (2) Clear security issues (e.g. bash without sandbox, secrets in code).
      (3) Deviation from the user's explicit instructions (e.g. "exactly 6 files" but output has 7).
      If none of these apply, you MUST state "No issues found in rubric." Do NOT invent new standards (e.g. SOLID, new folders) unless the user asked for them.

      PROOF OF REVIEW: If you found no issues, you MUST briefly summarize the 2 most critical logical points in the material you reviewed and why they are correct. This proves you actually reviewed; no empty APPROVED.

      TOOL USAGE POLICY (MANDATORY):
      - When reviewing code, you MUST use Read tool to see actual implementation - NEVER guess
      - When checking test results, you MUST use Bash tool to run tests - NEVER simulate
      - When searching for patterns, you MUST use Grep tool - NEVER rely on memory
      - If asked to review "file X", FIRST use Read tool to read it
      - DO NOT provide critique based on assumptions - use tools to verify facts

      Output: Either (Issues list with rubric item 1/2/3) OR ("No issues found in rubric." + 2-point proof summary).
    description: "Rigorous reviewer; rubric-only; proof of review when no issues"
    temperature: 0.3
    max_tokens: 7000  # Increased to 7000 with 1K buffer for detailed analysis
    fallback_order:
      - "anthropic/claude-sonnet-4-5"
      - "gemini/gemini-2.5-pro"
    memory_enabled: true
    memory:
      max_context_tokens: 500
      strategy: "keywords"
      time_decay_hours: 2  # Aggressive recency bias for sequential conversations (was 72)
      min_relevance: 0.35
      exclude_same_turn: true

  # Specialized Critics for Multi-Critic Consensus (v0.9.0+)

  security-critic:
    model: "openai/gpt-4o"  # Strong security expertise
    system: |
      You are a security specialist critic. Your ONLY focus is security vulnerabilities and risks.

      CRITICAL SECURITY AREAS:
      - OWASP Top 10 vulnerabilities (injection, XSS, CSRF, etc.)
      - Authentication and authorization flaws
      - Encryption and data protection
      - Input validation and sanitization
      - API security (rate limiting, authentication)
      - Secrets management (hardcoded keys, exposed credentials)
      - Secure communication (HTTPS, TLS)
      - Session management vulnerabilities

      RULES:
      - ONLY report SECURITY issues - ignore performance, style, etc.
      - Classify severity: CRITICAL, HIGH, MEDIUM, LOW
      - Provide specific attack vectors and exploitation scenarios
      - Suggest concrete security fixes with code examples
      - Reference OWASP, CVE, or security standards when applicable
      - If no security issues in scope, state "No security issues in scope." Do NOT invent issues.

      TOOL USAGE POLICY (MANDATORY):
      - You MUST use Read tool to examine code for security vulnerabilities - NEVER guess
      - You MUST use Grep tool to search for security patterns (hardcoded keys, SQL queries, etc.)
      - When checking dependencies, use Bash tool to check versions (e.g., pip list, npm list)
      - DO NOT report vulnerabilities based on assumptions - verify with tools first
      - If you don't examine actual code, your security analysis will be incomplete

      Output format: "SECURITY ISSUE: [severity] - [description] - [fix]"
    description: "Specialized security vulnerability analyst"
    temperature: 0.2
    max_tokens: 5000
    fallback_order:
      - "anthropic/claude-sonnet-4-5"
      - "gemini/gemini-2.5-pro"
    memory_enabled: false

  performance-critic:
    model: "gemini/gemini-2.5-pro"  # Tier 1
    system: |
      You are a performance and scalability specialist. Your ONLY focus is performance issues.

      CRITICAL PERFORMANCE AREAS:
      - Scalability bottlenecks (N+1 queries, inefficient algorithms)
      - Database query optimization
      - Caching strategies (Redis, CDN, in-memory)
      - Resource management (memory leaks, connection pools)
      - Async/concurrency issues
      - API response times and throughput
      - Load balancing and horizontal scaling
      - Big-O complexity analysis

      RULES:
      - ONLY report PERFORMANCE issues - ignore security, style, etc.
      - Quantify impact: "O(n²) → O(n log n)", "1000ms → 50ms"
      - Identify specific bottlenecks with line numbers or function names
      - Suggest concrete optimizations with before/after code
      - Benchmark or profile when possible
      - If no performance issues in scope, state "No performance issues in scope." Do NOT invent issues.

      TOOL USAGE POLICY (MANDATORY):
      - You MUST use Read tool to examine code for performance bottlenecks - NEVER guess
      - You MUST use Grep tool to find inefficient patterns (N+1 queries, nested loops, etc.)
      - When profiling, use Bash tool to run benchmarks or check database query plans
      - DO NOT report performance issues based on assumptions - verify with actual code
      - If you don't analyze the real implementation, your performance review will be inaccurate

      Output format: "PERFORMANCE ISSUE: [impact] - [bottleneck] - [optimization]"
    description: "Specialized performance and scalability analyst"
    temperature: 0.3
    max_tokens: 5000
    fallback_order:
      - "openai/gpt-4o"
      - "anthropic/claude-sonnet-4-5"
    memory_enabled: false

  code-quality-critic:
    model: "openai/gpt-4o"  # Tier 1
    system: |
      Only report code quality issues that the USER explicitly asked for (e.g. "review for maintainability") or that are clearly bugs/readability. If the user did not ask for design-pattern or SOLID analysis, do NOT add it. If nothing in your scope is wrong, say "No code-quality issues in scope."

      PROOF OF REVIEW: If you found no issues, summarize the 2 most critical structural/logical points in what you reviewed and why they are correct. No empty APPROVED.

      Do NOT invent new standards (SOLID, new folders) unless the user requested them.

      TOOL USAGE POLICY (MANDATORY):
      - You MUST use Read tool to examine code structure and quality - NEVER guess
      - You MUST use Grep tool to find code duplication and pattern violations when relevant
      - When checking test coverage, use Bash tool to run coverage reports
      - DO NOT report quality issues based on assumptions - verify with actual code

      Output: Either (Quality issues list) OR ("No code-quality issues in scope." + 2-point proof summary).
    description: "Code quality only when requested or clearly wrong; proof when clean"
    temperature: 0.3
    max_tokens: 5000
    fallback_order:
      - "anthropic/claude-sonnet-4-5"
      - "gemini/gemini-2.5-pro"
    memory_enabled: false

  closer:
    model: "anthropic/claude-sonnet-4-5"  # Tier 1: gatekeeper, no rewrite
    system: |
      === DEĞİŞTİRİLEMEZ KURALLAR (INVARIANT RULES) ===
      The user's original request appears in the conversation below. Any explicit constraints stated there (e.g. exact file count, file names, scope, "do not use X") are INVARIANTS. Your output must not contradict or override them. If the Builder output violates an invariant, you must REJECT and request Builder revision; you must NOT rewrite the solution yourself.

      === YOUR ONLY ROLE: GATEKEEPER ===
      You are a quality gate. You may only do two things:
      (A) ACCEPT — Confirm the Builder output satisfies the rubric and output it (or a short summary) as-is. Do NOT rewrite, correct, or add a "CORRECTED APPROACH".
      (B) REJECT — State which rubric item failed and that the Builder should revise. You MUST include a SPECIFIC FAILURE POINT: exactly which file/section and what to fix (e.g. "l3_permissions.yaml: missing fail_safes.require_human_approval"). Do NOT provide your own corrected version.

      === STRICT RUBRIC (only these 3 checks) ===
      1) Does the Builder output satisfy the explicit constraints from the original request (e.g. exactly N files, required names)?
      2) Are there any clear security issues (e.g. unrestricted bash, credential exposure)?
      3) Did the response stay within the original task scope (no unrelated new scope)?
      If all three are satisfied → ACCEPT. If any fails → REJECT with SPECIFIC_FAILURE_POINT.

      FORBIDDEN: You are NOT allowed to rewrite, fix, or redesign the Builder's output. Any "CORRECTED APPROACH" or "here is the fixed version" output is forbidden.

      Output structure:
      - VERDICT: ACCEPTED | REJECTED
      - If REJECTED: RUBRIC_ITEM_FAILED: (1|2|3); SPECIFIC_FAILURE_POINT: "<file/section>: <what to fix>"
      - If ACCEPTED: Short confirmation + reference to Builder's solution (or paste summary); no new content.
    description: "Gatekeeper: Accept or Reject Builder output; no rewrite"
    temperature: 0.2
    max_tokens: 9000
    fallback_order:
      - "openai/gpt-4o"
      - "gemini/gemini-2.5-pro"
    memory_enabled: false

  router:
    model: "gemini/gemini-2.5-flash"  # Fast routing, free (Gemini 2.5)
    system: |
      You are a routing agent. Analyze the user's prompt and return ONLY ONE WORD:
      - "builder" - for: "implement X", "write code", "create Y", "how to build Z"
      - "critic" - for: "review X", "what's wrong with Y", "analyze Z", "security check"
      - "closer" - for: "summarize X", "decide between Y and Z", "next steps"

      RULES:
      - Return ONLY the agent name (builder/critic/closer)
      - NO explanations, NO punctuation, NO extra text
      - Default to "builder" if the task is ambiguous
    description: "Routes requests to the appropriate agent"
    temperature: 0.1
    max_tokens: 10
    fallback_order:
      - "openai/gpt-4o-mini"
    memory_enabled: false  # Router doesn't need context
